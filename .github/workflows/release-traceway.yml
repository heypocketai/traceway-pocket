name: Release Traceway

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z, no leading v)"
        required: true
        type: string
      change_1:
        description: "Changelog item 1 (optional)"
        required: false
        type: string
      change_2:
        description: "Changelog item 2 (optional)"
        required: false
        type: string
      change_3:
        description: "Changelog item 3 (optional)"
        required: false
        type: string
      change_4:
        description: "Changelog item 4 (optional)"
        required: false
        type: string
      change_5:
        description: "Changelog item 5 (optional)"
        required: false
        type: string

permissions:
  contents: write
  actions: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be in X.Y.Z format (got '${{ inputs.version }}')"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag does not already exist
        run: |
          TAG="backend/v${{ inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: tag $TAG already exists"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "latest"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump frontend version
        working-directory: frontend
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Commit version bump
        run: |
          git add frontend/package.json frontend/package-lock.json
          git commit -m "v to ${{ inputs.version }}"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Bundle frontend into backend
        run: |
          rm -rf backend/static/frontend
          mkdir -p backend/static/frontend
          cp -r frontend/build/. backend/static/frontend/

      - name: Generate blog post
        env:
          C1: ${{ inputs.change_1 }}
          C2: ${{ inputs.change_2 }}
          C3: ${{ inputs.change_3 }}
          C4: ${{ inputs.change_4 }}
          C5: ${{ inputs.change_5 }}
        run: |
          mkdir -p website/content/blog
          POST="website/content/blog/v${{ inputs.version }}.mdx"
          {
            echo "---"
            echo "title: \"Backend v${{ inputs.version }}\""
            echo "date: \"$(date -u +%Y-%m-%d)\""
            echo "version: \"${{ inputs.version }}\""
            echo "---"
            echo ""
            for C in "$C1" "$C2" "$C3" "$C4" "$C5"; do
              if [ -n "$C" ]; then
                echo "- $C"
              fi
            done
          } > "$POST"
          echo "Generated $POST:"
          cat "$POST"

      - name: Commit release
        run: |
          git add backend/static/frontend/ website/content/blog/
          git add -A backend/
          git commit -m "release: backend v${{ inputs.version }}"

      - name: Tag release
        run: git tag "backend/v${{ inputs.version }}"

      - name: Push branch and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "backend/v${{ inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          C1: ${{ inputs.change_1 }}
          C2: ${{ inputs.change_2 }}
          C3: ${{ inputs.change_3 }}
          C4: ${{ inputs.change_4 }}
          C5: ${{ inputs.change_5 }}
        run: |
          NOTES=""
          for C in "$C1" "$C2" "$C3" "$C4" "$C5"; do
            if [ -n "$C" ]; then
              NOTES="${NOTES}- ${C}"$'\n'
            fi
          done
          if [ -z "$NOTES" ]; then
            NOTES="Backend v${{ inputs.version }}"
          fi
          gh release create "backend/v${{ inputs.version }}" \
            --title "Backend v${{ inputs.version }}" \
            --notes "$NOTES"

      - name: Trigger website + docs deploys
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release-website.yml --ref "${{ github.ref_name }}"
          gh workflow run release-docs.yml --ref "${{ github.ref_name }}"

  build-docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push full image
        id: docker_build_full
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/traceway:v${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/traceway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push minimal image
        id: docker_build_minimal
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.minimal
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/traceway:v${{ inputs.version }}-minimal
            ghcr.io/${{ github.repository_owner }}/traceway:minimal
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push SQLite image
        id: docker_build_sqlite
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.sqlite
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/traceway:v${{ inputs.version }}-sqlite
            ghcr.io/${{ github.repository_owner }}/traceway:sqlite
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.0'

      - name: Sign full image
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/traceway@${{ steps.docker_build_full.outputs.digest }}

      - name: Sign minimal image
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/traceway@${{ steps.docker_build_minimal.outputs.digest }}

      - name: Sign SQLite image
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/traceway@${{ steps.docker_build_sqlite.outputs.digest }}

      - name: Summary
        run: |
          echo "### Docker Images (signed with Cosign)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Full Image** (ClickHouse + PostgreSQL + supervisord):" >> "$GITHUB_STEP_SUMMARY"
          echo "\`ghcr.io/${{ github.repository_owner }}/traceway:v${{ inputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Minimal Image** (external ClickHouse/PostgreSQL):" >> "$GITHUB_STEP_SUMMARY"
          echo "\`ghcr.io/${{ github.repository_owner }}/traceway:v${{ inputs.version }}-minimal\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**SQLite Image** (embedded SQLite, single binary, no dependencies):" >> "$GITHUB_STEP_SUMMARY"
          echo "\`ghcr.io/${{ github.repository_owner }}/traceway:v${{ inputs.version }}-sqlite\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All images tagged with version, plus \`latest\`, \`minimal\`, and \`sqlite\` respectively." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "See [DOCKER_SIGNATURES.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/DOCKER_SIGNATURES.md) to verify image signatures." >> "$GITHUB_STEP_SUMMARY"
