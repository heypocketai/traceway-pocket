name: benchmark-hardware

# Manual-only: this workflow provisions and tears down Hetzner servers, which
# costs real money (about €0.30/run today). Triggering must be deliberate.
on:
  workflow_dispatch:
    inputs:
      tiers:
        description: 'Comma-separated Hetzner tiers. ccx13=2 cores, ccx23=4, ccx33=8, ccx43=16. With max-parallel:1 the quota cap is per-tier; ccx43 needs ≥16 dedicated vCPUs.'
        required: true
        default: 'ccx13,ccx23,ccx33'
      modes:
        description: 'Comma-separated DB modes (sqlite,pgch,managed-ch). managed-ch points at an external ClickHouse and requires the BENCH_CH_* repository secrets.'
        required: true
        default: 'sqlite,pgch'
      signals:
        description: 'Comma-separated OTLP signals to benchmark (spans,metrics,logs). Each is a separate fresh VM pair.'
        required: true
        default: 'spans,metrics,logs'
      scenario:
        description: 'Benchmark scenario: throughput (three-phase ingest ramp, default; writes to benchmarks/results-throughput/) or read-probe (ingest to fill levels, probe a read, fail above 5s; writes to benchmarks/results-probe/).'
        required: true
        type: choice
        options:
          - throughput
          - read-probe
        default: 'throughput'
      duration:
        description: 'Per-matrix-entry loadgen duration (e.g. 30m, 5m)'
        required: true
        default: '30m'
      location:
        description: 'Hetzner datacenter (nbg1, fsn1, hel1, ash, hil)'
        required: true
        default: 'nbg1'
      async_insert:
        description: 'When true, sets CH_ASYNC_INSERT=1 on the SUT for this dispatch. Result files gain a -async suffix so paired bars can be rendered alongside the default (off) pass.'
        required: true
        type: boolean
        default: false

concurrency:
  group: benchmark-hardware
  cancel-in-progress: false

permissions:
  contents: write    # aggregate job commits the results back to main

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - id: plan
        name: Build matrix from inputs
        run: |
          set -euo pipefail
          tiers="${{ github.event.inputs.tiers }}"
          modes="${{ github.event.inputs.modes }}"
          signals="${{ github.event.inputs.signals }}"
          jq -nc \
            --arg tiers "${tiers}" \
            --arg modes "${modes}" \
            --arg signals "${signals}" \
            '{include: [
              ($tiers | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(. != ""))) as $T |
              ($modes | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(. != ""))) as $M |
              ($signals | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(. != ""))) as $S |
              $T[] as $t | $M[] as $m | $S[] as $s |
              {tier: $t, mode: $m, signal: $s}
            ]}' \
            > matrix.json
          cat matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  run:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Serialized for now: new Hetzner accounts cap dedicated cores low enough
      # that even 2 × ccx23 in parallel can hit the quota when combined with
      # other usage. Raise once the account is out of the new-user cool-down.
      max-parallel: 1
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      BENCH_LOCATION: ${{ github.event.inputs.location }}
      BENCH_SCENARIO: ${{ github.event.inputs.scenario }}
      # Managed-ClickHouse credentials. Used only when modes contains
      # managed-ch; empty for sqlite/pgch entries (harmless — sut-bootstrap
      # only validates them when MODE=managed-ch).
      CLICKHOUSE_SERVER: ${{ secrets.BENCH_CH_SERVER }}
      CLICKHOUSE_USERNAME: ${{ secrets.BENCH_CH_USERNAME }}
      CLICKHOUSE_PASSWORD: ${{ secrets.BENCH_CH_PASSWORD }}
      CLICKHOUSE_DATABASE: ${{ secrets.BENCH_CH_DATABASE }}
      BENCH_CH_HTTPS_PORT: ${{ secrets.BENCH_CH_HTTPS_PORT }}
    steps:
      - uses: actions/checkout@v4

      - name: Install hcloud CLI
        run: |
          curl -fsSL https://github.com/hetznercloud/cli/releases/download/v1.50.0/hcloud-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin hcloud

      - name: Install matplotlib (chart render is in aggregate job, but preflight checks it)
        run: pip install --quiet matplotlib

      - name: Materialize SSH key
        run: |
          umask 077
          key="$RUNNER_TEMP/benchmark-key"
          printf '%s\n' "${{ secrets.BENCHMARK_SSH_PRIVATE_KEY }}" > "$key"
          echo "BENCHMARK_SSH_KEY=$key" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Preflight
        env:
          BENCH_MODES_PLAN: ${{ matrix.mode }}
        run: ./benchmarks/scripts/preflight.sh

      - name: Run matrix entry (${{ matrix.tier }} / ${{ matrix.mode }} / ${{ matrix.signal }})
        run: |
          async_arg=""
          if [[ "${{ github.event.inputs.async_insert }}" == "true" ]]; then
              async_arg="async"
          fi
          ./benchmarks/scripts/run-matrix-entry.sh "${{ matrix.tier }}" "${{ matrix.mode }}" "${{ matrix.signal }}" "${{ github.event.inputs.duration }}" benchmarks/_artifact "" "${async_arg}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-${{ matrix.tier }}-${{ matrix.mode }}-${{ matrix.signal }}${{ github.event.inputs.async_insert == 'true' && '-async' || '' }}
          path: benchmarks/_artifact/*.json
          if-no-files-found: warn

  aggregate:
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so the bot commit doesn't trample anything.
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/results-raw

      - name: Stage into scenario folder
        id: stage
        run: |
          set -euo pipefail
          # One canonical folder per scenario, wiped on each dispatch so the
          # committed tree reflects exactly one dispatch — but the two
          # scenarios live in sibling folders so a read-probe run never
          # clobbers throughput results and vice-versa.
          case "${{ github.event.inputs.scenario }}" in
              throughput) dst="benchmarks/results-throughput" ;;
              read-probe) dst="benchmarks/results-probe" ;;
              *) echo "unknown scenario '${{ github.event.inputs.scenario }}'" >&2; exit 1 ;;
          esac
          rm -rf "${dst}"
          mkdir -p "${dst}"
          find /tmp/results-raw -name '*.json' -exec cp {} "${dst}/" \;
          echo "dst=${dst}" >> "$GITHUB_OUTPUT"
          ls -la "${dst}"

      - name: Render charts
        run: |
          pip install --quiet matplotlib
          python3 benchmarks/scripts/chart.py "${{ steps.stage.outputs.dst }}"

      - name: Commit results
        run: |
          set -euo pipefail
          git config user.name "traceway-bot"
          git config user.email "bot@tracewayapp.com"

          staged="${{ steps.stage.outputs.dst }}"

          # Copy our staged data aside before touching git state. We always
          # need to restore it after `reset --hard` regardless of what main
          # currently has at this scenario folder — this dispatch's data is
          # the new source of truth.
          tmp_staged="$(mktemp -d)/staged"
          cp -a "${staged}" "${tmp_staged}"

          echo "syncing checkout to latest origin/main before committing"
          git fetch origin main
          git reset --hard origin/main

          # Wipe whatever main had at this scenario folder (probably a prior
          # dispatch of the SAME scenario) and replace it with this
          # dispatch's full output. Using rm + cp + `git add -A` so deletions
          # are captured: if the prior commit had `ccx33-pgch-metrics-throughput.json`
          # but this dispatch only ran sqlite, the pgch JSON gets staged for
          # deletion. The committed scenario folder always reflects exactly
          # one dispatch of that scenario, never a union. The OTHER scenario
          # folder is untouched by this step.
          rm -rf "${staged}"
          mkdir -p "${staged}"
          cp -a "${tmp_staged}/." "${staged}/"
          rm -rf "${tmp_staged%/staged}"

          git add -A "${staged}"
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "bench: ${{ github.event.inputs.scenario }} $(date -u +%Y-%m-%d)"
          git push
